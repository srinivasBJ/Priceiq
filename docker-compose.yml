services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: priceiq
      POSTGRES_PASSWORD: password
      POSTGRES_DB: priceiq_dev
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data: